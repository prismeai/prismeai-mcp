slug: refreshOAuthToken
name: /01_Helpers/refreshOAuthToken
description: >-
  Refresh an expired OAuth access token for a specific tenant using the stored
  tenant-prefixed refresh_token. The provider may rotate refresh tokens; the new one is
  re-stored. Returns { accessToken, expiresAt } or { error }.
private: true
arguments:
  tenantId:
    type: string
  tenantConfig:
    type: object
do:
  - run:
      module: secrets
      function: get
      parameters:
        name: refresh_token_{{tenantId}}
        scope: user
      output: refreshTokenRef
  - conditions:
      '{{refreshTokenRef.error}}':
        - set:
            name: output
            value:
              error: true
              message: Could not retrieve refresh token. Please re-authorize.
              action: reauthorize
        - break: {}

  - conditions:
      '!{{tenantConfig.oauth.clientId}}':
        - set:
            name: output
            value:
              error: true
              message: Tenant has no OAuth provider configured for refresh.
              action: reauthorize
        - break: {}

  - fetch:
      method: POST
      url: '{{tenantConfig.oauth.tokenUrl}}'
      headers:
        Content-Type: application/x-www-form-urlencoded
      body:
        client_id: '{{tenantConfig.oauth.clientId}}'
        client_secret: '{{tenantConfig.oauth.clientSecret}}'
        refresh_token: '{{refreshTokenRef}}'
        grant_type: refresh_token
      output: tokenResponse
      outputMode: body
      emitErrors: false
  - conditions:
      '{{tokenResponse.error}}':
        - set:
            name: output
            value:
              error: true
              message: 'Refresh failed: {{tokenResponse.error_description}}'
              action: reauthorize
        - break: {}

  - run:
      module: secrets
      function: set
      parameters:
        name: delegated_token_{{tenantId}}
        value: '{{tokenResponse.access_token}}'
        scope: user
        ttl: '{{tokenResponse.expires_in}}'
  - conditions:
      '{{tokenResponse.refresh_token}}':
        - run:
            module: secrets
            function: set
            parameters:
              name: refresh_token_{{tenantId}}
              value: '{{tokenResponse.refresh_token}}'
              scope: user
              ttl: '{% {{tenantConfig.oauth.refreshTokenTtl}} || 7200 %}'

  - set:
      name: now
      value: '{% date({{run.date}}).ts %}'
  - set:
      name: expiresAtTs
      value: '{% {{now}} + {{tokenResponse.expires_in}} * 1000 %}'
  - set:
      name: expiresAt
      value: '{% date({{expiresAtTs}}).iso %}'

  - set:
      name: user.<<SERVICE_SLUG>>.oauth
      scope: user
      value:
        status: connected
        authMethod: delegated
        tenantId: '{{tenantId}}'
        expiresAt: '{{expiresAt}}'
        tokenType: '{{tokenResponse.token_type}}'
        scopes: '{{tokenResponse.scope}}'
        connectedAt: '{{user.<<SERVICE_SLUG>>.oauth.connectedAt}}'

  - run:
      module: secrets
      function: get
      parameters:
        name: delegated_token_{{tenantId}}
        scope: user
      output: accessTokenRef
  - set:
      name: output
      value:
        accessToken: '{{accessTokenRef}}'
        expiresAt: '{{expiresAt}}'
output: '{{output}}'
