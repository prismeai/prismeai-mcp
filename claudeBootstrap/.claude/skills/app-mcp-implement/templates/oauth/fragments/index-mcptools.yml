# Prepend these two tools at the top of config.value.mcpTools in index.yml
# so tools/list surfaces them to the LLM before the service's regular tools.

- name: disconnect
  description: >-
    Disconnect the current <<SERVICE_NAME>> OAuth session and revoke the
    access token (RFC 7009). Only call when the user explicitly asks to sign
    out, disconnect, or log out of <<SERVICE_NAME>>. For regular data
    requests, call the relevant data tool — do not call disconnect.
  inputSchema:
    type: object
    properties:
      outputFormat:
        type: string
        enum: [structured, verbose, both]
        default: verbose
        description: Response format for the MCP client.

- name: connect
  description: >-
    Initiate an OAuth connection to <<SERVICE_NAME>>. Returns a connect_url
    for the user to click. **Prefer calling data tools directly — they
    auto-handle authentication and will themselves return a connect_url when
    the user is not signed in.** Call this tool only when the user
    explicitly asks to sign in, switch accounts, or when a data tool told
    you authentication is required and the user asks to retry. Calling
    connect when the user is already connected is a no-op (server returns
    an 'already connected' message).
  inputSchema:
    type: object
    properties:
      outputFormat:
        type: string
        enum: [structured, verbose, both]
        default: verbose
        description: Response format for the MCP client.
