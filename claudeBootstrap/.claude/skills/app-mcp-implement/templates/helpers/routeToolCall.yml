slug: routeToolCall
name: /01_Helpers/routeToolCall
description: >-
  Route an MCP tool call. Tools are grouped by entity (e.g. `workbooks`,
  `users`, `projects`); each tool takes an `action` argument that maps to a
  concrete operationId via the ENTITY_OPS registry in Custom Code. Falls
  back to direct operationName dispatch (backward compat) if the toolName
  isn't an entity but matches a real op.
private: true
arguments:
  toolName:
    type: string
  toolArgs:
    type: object
do:
  - comment: Try to resolve toolName as an entity + action
  - Custom Code.run:
      function: resolveToolAction
      parameters:
        toolName: '{{toolName}}'
        action: '{{toolArgs.arguments.action}}'
      output: resolved
  - conditions:
      '!{{resolved.error}}':
        - set:
            name: operationName
            value: '{{resolved.operationName}}'
      default:
        - comment: Backward-compat — toolName might already be a direct operationId
        - Custom Code.run:
            function: getOperation
            parameters:
              operationName: '{{toolName}}'
            output: directOp
        - conditions:
            '{{directOp.error}}':
              - set:
                  name: result
                  value:
                    content:
                      - type: text
                        text: '{{resolved.error}}'
                    isError: true
              - break: {}
        - set:
            name: operationName
            value: '{{toolName}}'
  - comment: Look up op metadata to decide REST vs GraphQL dispatcher
  - Custom Code.run:
      function: getOperation
      parameters:
        operationName: '{{operationName}}'
      output: opMeta
  - conditions:
      '{{opMeta.error}}':
        - set:
            name: result
            value:
              content:
                - type: text
                  text: 'Internal error — resolved operation `{{operationName}}` not found in registry.'
              isError: true
        - break: {}
  - conditions:
      '{{opMeta.graphql}}':
        - tool-graphqlOp:
            toolName: '{{operationName}}'
            body: '{{toolArgs}}'
            output: result
      default:
        - tool-restOp:
            toolName: '{{operationName}}'
            body: '{{toolArgs}}'
            output: result
output: '{{result}}'
