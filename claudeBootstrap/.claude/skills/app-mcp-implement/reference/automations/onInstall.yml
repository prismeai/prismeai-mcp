slug: onInstall
name: MCP/onInstall
description: >-
  Provision the tenant app-instance on install/configure (tenant-context model,
  NO HMAC key). Sets the MCP endpoint (this instance's own webhook) + the config
  app link, provisions two tenant secrets — `salesforceAuth` (object: auth
  mode + credentials) and `salesforceAuthorizedAgents` (agent allowlist) —
  and writes the two-hop bindings so `config.auth` / `config.authorizedAgents`
  resolve. Idempotent.
private: true
when:
  events:
    - workspaces.apps.installed
    - workspaces.apps.configured
do:
  - conditions:
      '!{{run.appInstanceSlug}}':
        - emit:
            event: salesforce.onInstall.skipped
            payload:
              reason: no-app-instance-slug
        - break: {}
  - auth:
      workspace: true
      output: wsJwt
  - comment: >-
      Resolve the tenant workspace SLUG so every generated endpoint is
      id-independent (survives a re-import that changes the workspace id, and
      client hosts that differ). The platform resolves `slug:<slug>` globally on
      /workspaces/:id routes (webhooks, /config, /security/secrets). Fall back to
      the id when the slug can't be read.
  - fetch:
      url: '{{global.apiUrl}}/workspaces/{{global.workspaceId}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      output: wsInfo
      outputMode: body
      emitErrors: false
  - set:
      name: wsRef
      value: '{{global.workspaceId}}'
  - conditions:
      '{{wsInfo.slug}}':
        - set:
            name: wsRef
            value: 'slug:{{wsInfo.slug}}'
  - set:
      name: mcpEndpoint
      value: '{{global.apiUrl}}/workspaces/{{wsRef}}/webhooks/{{run.appInstanceSlug}}.mcp'
  - set:
      name: configAppUrl
      value: '{{global.studioUrl}}/apps/salesforce?workspaceId={{wsRef}}&appInstance={{run.appInstanceSlug}}'
  - set:
      name: oauthCallbackUrl
      value: '{{global.apiUrl}}/workspaces/{{wsRef}}/webhooks/{{run.appInstanceSlug}}.oauthCallback'
  - set:
      name: secretsUrl
      value: '{{global.apiUrl}}/workspaces/{{wsRef}}/security/secrets'
  - fetch:
      url: '{{secretsUrl}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      output: existingSecretsResp
      outputMode: detailed_response
      emitErrors: false
  - set:
      name: existingSecrets
      value: '{{existingSecretsResp.body}}'
  - set:
      name: toProvision
      value: {}
  - set:
      name: provisionCount
      value: 0
  - conditions:
      '!{{existingSecrets.salesforceAuth}}':
        - set:
            name: toProvision.salesforceAuth
            value:
              value: {}
              description: 'Salesforce auth config (managed by the connector config app): { mode, loginHost, jwtUsername, oauthClientId, oauthClientSecret, jwtPrivateKey, accessToken, instanceUrl }.'
        - set:
            name: provisionCount
            value: '{% {{provisionCount}} + 1 %}'
  - conditions:
      '!{{existingSecrets.salesforceAuthorizedAgents}}':
        - set:
            name: toProvision.salesforceAuthorizedAgents
            value:
              value: ''
              description: 'Comma-separated agentIds authorized to call this connector''s MCP endpoint. Managed by the config app.'
        - set:
            name: provisionCount
            value: '{% {{provisionCount}} + 1 %}'
  - conditions:
      '{{provisionCount}} > 0':
        - fetch:
            url: '{{secretsUrl}}'
            method: PATCH
            headers:
              Authorization: Bearer {{wsJwt.jwt}}
              Content-Type: application/json
            body: '{{toProvision}}'
            output: provisionResp
            outputMode: detailed_response
            emitErrors: false
        - emit:
            event: salesforce.onInstall.secretsProvisioned
            payload:
              status: '{{provisionResp.status}}'
              count: '{{provisionCount}}'
  - comment: >-
      Binding B — tenant workspace config.value maps each config key onto its
      secret (a secret reference only resolves inside config.value). Literals
      built via Custom Code. PATCH /config replaces `value`, so GET first + merge.
  - Custom Code.run:
      function: makeSecretRef
      parameters:
        key: salesforceAuth
      output: secretRefAuth
  - Custom Code.run:
      function: makeSecretRef
      parameters:
        key: salesforceAuthorizedAgents
      output: secretRefAllowlist
  - set:
      name: configUrl
      value: '{{global.apiUrl}}/workspaces/{{wsRef}}/config'
  - fetch:
      url: '{{configUrl}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      output: curWsConfig
      outputMode: body
      emitErrors: false
  - set:
      name: newWsValue
      value: '{{curWsConfig.value}}'
  - set:
      name: newWsValue.salesforceAuth
      value: '{{secretRefAuth}}'
  - set:
      name: newWsValue.salesforceAuthorizedAgents
      value: '{{secretRefAllowlist}}'
  - fetch:
      url: '{{configUrl}}'
      method: PATCH
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
        Content-Type: application/json
      body:
        value: '{{newWsValue}}'
      output: wsConfigResp
      outputMode: detailed_response
      emitErrors: false
  - emit:
      event: salesforce.onInstall.completed
      payload:
        mcpEndpoint: '{{mcpEndpoint}}'
        secretsProvisioned: '{{provisionCount}}'
  - comment: >-
      Binding A (terminal merge) — instance config keys point at the tenant
      workspace config.value (binding B). `set: config` merge is terminal — keep last.
  - Custom Code.run:
      function: makeConfigRef
      parameters:
        key: salesforceAuth
      output: bindingAuth
  - Custom Code.run:
      function: makeConfigRef
      parameters:
        key: salesforceAuthorizedAgents
      output: bindingAllowlist
  - set:
      name: config
      type: merge
      value:
        mcpEndpoint: '{{mcpEndpoint}}'
        configAppUrl: '{{configAppUrl}}'
        oauthCallbackUrl: '{{oauthCallbackUrl}}'
        auth: '{{bindingAuth}}'
        authorizedAgents: '{{bindingAllowlist}}'
output: '{{mcpEndpoint}}'
