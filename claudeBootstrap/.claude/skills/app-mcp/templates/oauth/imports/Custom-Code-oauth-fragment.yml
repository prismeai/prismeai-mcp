# Fragment to APPEND to imports/Custom Code.yml under config.functions
# when the target service supports OAuth2 authorization-code (PKCE).
# The non-OAuth template's Custom-Code.yml already has generateSignedKey,
# verifyAndDecodeKey, buildQueryString, pruneEmpty — don't duplicate those.

# ===================== OAUTH2 (PKCE + state + authorize URL) =====================

generatePkce:
  parameters: {}
  code: |
    const crypto = require('crypto');
    const codeVerifier = crypto.randomBytes(32).toString('base64url');
    const codeChallenge = crypto
      .createHash('sha256')
      .update(codeVerifier)
      .digest('base64url');
    return { codeVerifier, codeChallenge };

generateState:
  parameters: {}
  code: |
    const crypto = require('crypto');
    return { state: crypto.randomBytes(16).toString('base64url') };

# Build literal binding strings in plain JS so DSUL never parses them as tokens.
# onInstall uses these to auto-wire the per-tenant OAuth credential bindings:
#   - makeConfigRef('xOauthClientId') -> '{{config.xOauthClientId}}'  (binding A, app instance config)
#   - makeSecretRef('xOauthClientId') -> '{{secret.xOauthClientId}}'  (binding B, workspace config.value)
# A direct {{config.x}} / {{secret.x}} written from an automation resolves to
# empty at set-time; substituting the CC-returned string is single-pass, so the
# literal is STORED and resolves later at read time. Validated on google-docs.
makeConfigRef:
  parameters:
    key:
      type: string
  code: |
    return '{' + '{config.' + key + '}' + '}';

makeSecretRef:
  parameters:
    key:
      type: string
  code: |
    return '{' + '{secret.' + key + '}' + '}';

filterOAuthTools:
  parameters:
    # IMPORTANT: never use `type: array` in Custom Code parameters. The CC loader
    # rejects the whole module — every function in this file (including unrelated
    # ones like generateSignedKey) starts returning "Function not found" at runtime.
    # Use `type: object`; JS code can iterate it as an array via Array.isArray + .filter.
    tools:
      type: object
    remove:
      type: object
  code: |
    // Used by mcp.yml on tools/list to filter connect/disconnect based on
    // state. `remove` lists which tool names to hide:
    //   - OAuth not configured on tenant     → ['connect', 'disconnect']
    //   - OAuth configured, user NOT connected → no call (pass through)
    //   - OAuth configured, user IS connected  → ['connect']
    // Defaults to removing both when `remove` is empty/absent.
    var toRemove = (remove && remove.length ? remove : ['connect', 'disconnect']);
    var set = {};
    for (var i = 0; i < toRemove.length; i++) set[toRemove[i]] = true;
    return (tools || []).filter(function (t) {
      return t && !set[t.name];
    });

buildAuthorizeUrl:
  parameters:
    authorizeUrl:
      type: string
    clientId:
      type: string
    redirectUri:
      type: string
    scopes:
      type: string
    state:
      type: string
    codeChallenge:
      type: string
  code: |
    // IMPORTANT: Custom Code sandbox is Node WITHOUT web globals.
    // URLSearchParams / URL are NOT defined. Use encodeURIComponent manually.
    const enc = encodeURIComponent;
    const qs = [
      'client_id=' + enc(clientId || ''),
      'redirect_uri=' + enc(redirectUri || ''),
      'response_type=code',
      'state=' + enc(state || ''),
      'scope=' + enc(scopes || 'api'),
      'code_challenge=' + enc(codeChallenge || ''),
      'code_challenge_method=S256',
    ].join('&');
    return { url: (authorizeUrl || '') + '?' + qs };
