# Fragment to MERGE into index.yml under secrets.schema
# (Optional — only if the central workspace wants to store shared OAuth app
# credentials as a fallback for all tenants. Normally per-tenant is preferred.)

<<SERVICE_SLUG>>OauthClientId:
  type: string
  title: <<SERVICE_NAME>> OAuth Client ID
  description: Client ID of the <<SERVICE_NAME>> OAuth Application (shared fallback).

<<SERVICE_SLUG>>OauthClientSecret:
  type: string
  title: <<SERVICE_NAME>> OAuth Client Secret
  description: Client Secret of the <<SERVICE_NAME>> OAuth Application (shared fallback).
  ui:widget: password
