slug: disconnectOAuth
name: 00_OAuth/disconnectOAuth
description: >-
  Revoke the current user's OAuth tokens and delete the user-scoped secrets.
  Works as both:
    - A webhook endpoint (called by the frontend connect card's "Disconnect"
      button — identifies tenant via ?mcpApiKey= or session.mcpApiKey).
    - An internal automation (called by method-disconnect with tenantId +
      tenantConfig args).
when:
  endpoint: true
arguments:
  tenantId:
    type: string
  tenantConfig:
    type: object
do:
  # ---------------- Resolve tenantId + tenantConfig ----------------
  - conditions:
      '{{tenantId}}':
        - comment: Internal call — use args directly
        - set:
            name: effectiveTenantId
            value: '{{tenantId}}'
        - set:
            name: effectiveTenantConfig
            value: '{{tenantConfig}}'
        - set:
            name: isWebhook
            value: false
      default:
        - comment: Webhook call — resolve from mcpApiKey (query, header, or session)
        - set:
            name: isWebhook
            value: true
        - set:
            name: apiKey
            value: '{% {{query.mcpApiKey}} || {{headers["mcp-api-key"]}} || {{session.mcpApiKey}} %}'
        - conditions:
            '!{{apiKey}}':
              - set:
                  name: $http
                  value:
                    status: 400
              - set:
                  name: output
                  value: 'Missing mcpApiKey (not in query, headers, or session).'
              - break: {}
        - Custom Code.run:
            function: verifyAndDecodeKey
            parameters:
              apiKey: '{{apiKey}}'
              secret: '{{config.appSecret}}'
            output: decoded
        - conditions:
            '{{decoded.error}}':
              - set:
                  name: $http
                  value:
                    status: 400
              - set:
                  name: output
                  value: 'Invalid mcpApiKey: {{decoded.error}}'
              - break: {}
        - set:
            name: effectiveTenantId
            value: '{{decoded.workspaceId}}'
        - fetch:
            url: '{{decoded.getConfigUrl}}'
            method: GET
            output: credResp
            outputMode: detailed_response
            emitErrors: false
        - set:
            name: effectiveTenantConfig
            value: '{{credResp.body}}'

  # ---------------- Revoke at provider + delete secrets ----------------
  - run:
      module: secrets
      function: get
      parameters:
        name: delegated_token_{{effectiveTenantId}}
        scope: user
      output: accessTokenRef
  - run:
      module: secrets
      function: get
      parameters:
        name: refresh_token_{{effectiveTenantId}}
        scope: user
      output: refreshTokenRef

  - conditions:
      '!{{accessTokenRef.error}} && {{effectiveTenantConfig.oauth.revocationUrl}} && {{effectiveTenantConfig.oauth.clientId}}':
        - try:
            do:
              - fetch:
                  method: POST
                  url: '{{effectiveTenantConfig.oauth.revocationUrl}}'
                  headers:
                    Content-Type: application/x-www-form-urlencoded
                  body:
                    client_id: '{{effectiveTenantConfig.oauth.clientId}}'
                    client_secret: '{{effectiveTenantConfig.oauth.clientSecret}}'
                    token: '{{accessTokenRef}}'
                    token_type_hint: access_token
                  emitErrors: false
            catch: []
  - conditions:
      '!{{refreshTokenRef.error}} && {{effectiveTenantConfig.oauth.revocationUrl}} && {{effectiveTenantConfig.oauth.clientId}}':
        - try:
            do:
              - fetch:
                  method: POST
                  url: '{{effectiveTenantConfig.oauth.revocationUrl}}'
                  headers:
                    Content-Type: application/x-www-form-urlencoded
                  body:
                    client_id: '{{effectiveTenantConfig.oauth.clientId}}'
                    client_secret: '{{effectiveTenantConfig.oauth.clientSecret}}'
                    token: '{{refreshTokenRef}}'
                    token_type_hint: refresh_token
                  emitErrors: false
            catch: []

  - try:
      do:
        - run:
            module: secrets
            function: delete
            parameters:
              name: delegated_token_{{effectiveTenantId}}
              scope: user
      catch: []
  - try:
      do:
        - run:
            module: secrets
            function: delete
            parameters:
              name: refresh_token_{{effectiveTenantId}}
              scope: user
      catch: []

  - delete:
      name: user.<<SERVICE_SLUG>>.oauth

  - comment: >-
      Bump user.connectorsVersion so per-user connector caches upstream can
      invalidate and re-check the now-disconnected state.
  - set:
      name: user.connectorsVersion
      scope: user
      value: '{{run.date}}'

  - emit:
      event: <<SERVICE_SLUG>>.oauth.disconnected
      payload:
        userId: '{{user.id}}'
        tenantId: '{{effectiveTenantId}}'

  # ---------------- Response ----------------
  - conditions:
      '{{isWebhook}}':
        - comment: Webhook — return a simple HTML page that closes the popup
        - set:
            name: $http
            value:
              headers:
                Content-Type: text/html
        - set:
            name: output
            value: >-
              <html><head><title>Disconnected</title></head><body
              style="font-family:sans-serif;max-width:420px;margin:60px auto;padding:24px;border:1px solid #e8eaed;border-radius:8px;text-align:center;"><h2>Disconnected</h2><p><<SERVICE_NAME>>
              session cleared. You can close this window.</p><script>try{if(window.opener){window.opener.postMessage({type:"connector_auth_complete",catalog_id:"connector-<<SERVICE_KEBAB>>",status:"disconnected"},"*");setTimeout(function(){window.close();},400);}}catch(e){}</script></body></html>
      default:
        - set:
            name: output
            value:
              disconnected: true
              tenantId: '{{effectiveTenantId}}'
output: '{{output}}'
