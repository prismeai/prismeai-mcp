slug: generateKey
name: 00_MCP/generateKey
description: >-
  Webhook called by tenant app instances to generate a signed MCP API key.
  Only the central <<SERVICE_NAME>> workspace (<<WORKSPACE_ID>>) has the
  appSecret, so key generation must happen here.
when:
  endpoint: true
do:
  - conditions:
      '!{{body.workspaceId}} || !{{body.getConfigUrl}}':
        - set:
            name: $http
            value:
              status: 400
        - set:
            name: response
            value:
              error: 'Missing required fields: workspaceId, getConfigUrl'
        - break: {}
  - conditions:
      '!{{config.appSecret}}':
        - set:
            name: $http
            value:
              status: 500
        - set:
            name: response
            value:
              error: appSecret not configured on central workspace
        - break: {}
  - Custom Code.run:
      function: generateSignedKey
      parameters:
        workspaceId: '{{body.workspaceId}}'
        getConfigUrl: '{{body.getConfigUrl}}'
        secret: '{{config.appSecret}}'
      output: signedKey
  - comment: >-
      Defense in depth: if the Custom Code module failed to load (e.g. a
      stray "#" comment in any code: | block, see Common Traps), signedKey
      will be { error: {message, stack}, logs, duration, path } — NOT a
      string. Return 500 so onInstall's status check catches it instead of
      merging garbage as mcpApiKey.
  - conditions:
      '{{signedKey.error}}':
        - set:
            name: $http
            value:
              status: 500
        - set:
            name: response
            value:
              error: 'Key generation failed: {{signedKey.error.message}}'
        - break: {}
  - set:
      name: response
      value:
        mcpApiKey: '{{signedKey}}'
output: '{{response}}'
